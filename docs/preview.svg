<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e4e6ea"/>
      <stop offset="50%" stop-color="#c2c6cd"/>
      <stop offset="100%" stop-color="#d8dade"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="mon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="monLive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dce6f5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#dce6f5" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="960" height="560" fill="url(#bg)"/>

  <!-- ===== Settings panel (top-left) ===== -->
  <g filter="url(#shadow)">
    <rect x="24" y="24" width="300" height="230" rx="20" fill="url(#panel)" stroke="rgba(255,255,255,0.55)"/>
  </g>
  <text x="44" y="58" font-size="15" font-weight="700" fill="#1a1d26">Settings</text>
  <circle cx="290" cy="52" r="5" fill="#3fb36a"/>
  <text x="260" y="57" font-size="11" fill="#5b606e" text-anchor="end">running</text>

  <!-- Token field -->
  <text x="44" y="88" font-size="10" fill="#5b606e" letter-spacing="0.5">TOKEN</text>
  <rect x="44" y="94" width="260" height="28" rx="8" fill="rgba(255,255,255,0.55)" stroke="rgba(0,0,0,0.10)"/>
  <text x="54" y="113" font-size="12" fill="#20232c" font-family="ui-monospace, 'SF Mono', monospace">••••••••••••••••</text>

  <!-- Bind field -->
  <text x="44" y="142" font-size="10" fill="#5b606e" letter-spacing="0.5">BIND ADDRESS</text>
  <rect x="44" y="148" width="260" height="28" rx="8" fill="rgba(255,255,255,0.55)" stroke="rgba(0,0,0,0.10)"/>
  <text x="54" y="167" font-size="12" fill="#20232c" font-family="ui-monospace, 'SF Mono', monospace">0.0.0.0:24242</text>

  <!-- Fingerprint field -->
  <text x="44" y="196" font-size="10" fill="#5b606e" letter-spacing="0.5">CERT FINGERPRINT</text>
  <rect x="44" y="202" width="260" height="24" rx="6" fill="rgba(255,255,255,0.35)" stroke="rgba(0,0,0,0.08)"/>
  <text x="54" y="218" font-size="10" fill="#5b606e" font-family="ui-monospace, 'SF Mono', monospace">a4:f1:9c:7e:2b:58:d3:0c:…</text>

  <!-- Stop button -->
  <rect x="232" y="234" width="72" height="14" rx="7" fill="rgba(180,70,70,0.85)"/>
  <text x="268" y="244" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Stop</text>

  <!-- ===== Logs panel (bottom-left) ===== -->
  <g filter="url(#shadow)">
    <rect x="24" y="270" width="300" height="266" rx="20" fill="url(#panel)" stroke="rgba(255,255,255,0.55)"/>
  </g>
  <text x="44" y="302" font-size="15" font-weight="700" fill="#1a1d26">Logs</text>
  <text x="304" y="302" font-size="11" fill="#5b606e" text-anchor="end">Clear</text>

  <rect x="40" y="316" width="268" height="204" rx="10" fill="rgba(0,0,0,0.04)"/>
  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="10">
    <text x="50" y="334" fill="#5b606e">12:04:18</text>
    <text x="110" y="334" fill="#20232c">listening on 0.0.0.0:24242</text>
    <text x="50" y="352" fill="#5b606e">12:04:22</text>
    <text x="110" y="352" fill="#20232c">client "laptop" connected</text>
    <text x="50" y="370" fill="#5b606e">12:04:22</text>
    <text x="110" y="370" fill="#20232c">placed at (1920, 0)</text>
    <text x="50" y="388" fill="#5b606e">12:05:01</text>
    <text x="110" y="388" fill="#20232c">grab-in → laptop</text>
    <text x="50" y="406" fill="#5b606e">12:05:04</text>
    <text x="110" y="406" fill="#20232c">grab-off ← laptop</text>
    <text x="50" y="424" fill="#5b606e">12:05:12</text>
    <text x="110" y="424" fill="#3aa05e">hotplug: +DISPLAY2</text>
    <text x="50" y="442" fill="#5b606e">12:05:12</text>
    <text x="110" y="442" fill="#20232c">recomputed bbox 5120×1920</text>
    <text x="50" y="460" fill="#5b606e">12:06:33</text>
    <text x="110" y="460" fill="#c06a2a">client "laptop" disconnected</text>
    <text x="50" y="478" fill="#5b606e">12:06:41</text>
    <text x="110" y="478" fill="#20232c">client "laptop" reconnected</text>
    <text x="50" y="496" fill="#5b606e">12:06:41</text>
    <text x="110" y="496" fill="#20232c">restored placement</text>
  </g>

  <!-- ===== Screen panel (right) ===== -->
  <g filter="url(#shadow)">
    <rect x="344" y="24" width="592" height="512" rx="20" fill="url(#panel)" stroke="rgba(255,255,255,0.55)"/>
  </g>
  <text x="364" y="58" font-size="15" font-weight="700" fill="#1a1d26">Screen</text>
  <g font-size="11" fill="#5b606e">
    <text x="720" y="57">grid</text>
    <rect x="742" y="44" width="46" height="20" rx="5" fill="rgba(255,255,255,0.55)" stroke="rgba(0,0,0,0.10)"/>
    <text x="765" y="58" text-anchor="middle" fill="#20232c" font-family="ui-monospace, monospace">240</text>
    <text x="795" y="57">px</text>
    <text x="830" y="57">−</text>
    <text x="860" y="57">100%</text>
    <text x="905" y="57">+</text>
  </g>

  <!-- Stage clip -->
  <clipPath id="stageClip"><rect x="360" y="76" width="560" height="448" rx="12"/></clipPath>

  <g clip-path="url(#stageClip)">
    <!-- Halo grid cells (to the left of server monitor — valid attach zone) -->
    <g fill="rgba(70,140,220,0.14)" stroke="rgba(70,140,220,0.45)" stroke-width="1">
      <rect x="380" y="180" width="60" height="60" rx="2"/>
      <rect x="380" y="244" width="60" height="60" rx="2"/>
      <rect x="380" y="308" width="60" height="60" rx="2"/>
    </g>
    <!-- Halo cells above server monitor -->
    <g fill="rgba(70,140,220,0.14)" stroke="rgba(70,140,220,0.45)" stroke-width="1">
      <rect x="448" y="108" width="60" height="60" rx="2"/>
      <rect x="512" y="108" width="60" height="60" rx="2"/>
      <rect x="576" y="108" width="60" height="60" rx="2"/>
      <rect x="640" y="108" width="60" height="60" rx="2"/>
    </g>

    <!-- Server monitor 1 (primary, live) -->
    <g>
      <rect x="448" y="180" width="256" height="192" rx="6" fill="url(#monLive)" stroke="rgba(70,110,170,0.55)" stroke-width="1.5"/>
      <text x="576" y="272" font-size="13" font-weight="700" fill="#2a2e38" text-anchor="middle">DISPLAY1</text>
      <text x="576" y="290" font-size="11" fill="#5b606e" text-anchor="middle">1920 × 1080 · primary</text>
      <!-- primary accent dot -->
      <circle cx="461" cy="193" r="3" fill="rgba(70,110,170,0.75)"/>
    </g>

    <!-- Server monitor 2 (to right of DISPLAY1) -->
    <g>
      <rect x="712" y="204" width="170" height="144" rx="6" fill="url(#mon)" stroke="rgba(255,255,255,0.32)"/>
      <text x="797" y="272" font-size="12" font-weight="700" fill="#2a2e38" text-anchor="middle">DISPLAY2</text>
      <text x="797" y="288" font-size="10" fill="#5b606e" text-anchor="middle">1280 × 1024</text>
    </g>

    <!-- Live client already docked below -->
    <g>
      <rect x="496" y="384" width="180" height="110" rx="6" fill="url(#monLive)" stroke="rgba(70,110,170,0.40)" stroke-width="1"/>
      <text x="586" y="436" font-size="12" font-weight="700" fill="#2a2e38" text-anchor="middle">linux-desk</text>
      <text x="586" y="452" font-size="10" fill="#5b606e" text-anchor="middle">1920 × 1200</text>
    </g>

    <!-- Ghost rect being dragged (left of DISPLAY1) -->
    <g>
      <rect x="388" y="188" width="52" height="176" rx="4"
            fill="rgba(70,140,220,0.08)"
            stroke="rgba(70,140,220,0.85)" stroke-width="2" stroke-dasharray="0"/>
      <text x="414" y="280" font-size="10" font-weight="600" fill="#3060a0" text-anchor="middle">ghost</text>
    </g>

    <!-- Dragging client rect (floating with cursor) -->
    <g opacity="0.85">
      <rect x="406" y="196" width="52" height="160" rx="6"
            fill="rgba(220,230,245,0.85)"
            stroke="rgba(70,110,170,0.55)" stroke-width="1"
            filter="url(#shadow)"/>
      <text x="432" y="278" font-size="10" font-weight="700" fill="#2a2e38" text-anchor="middle">laptop</text>
      <text x="432" y="292" font-size="9" fill="#5b606e" text-anchor="middle">1366×768</text>
    </g>

    <!-- Cursor arrow -->
    <g transform="translate(452, 268)">
      <path d="M0,0 L0,14 L4,10 L7,16 L9,15 L6,10 L11,10 Z"
            fill="#1a1d26" stroke="#ffffff" stroke-width="1" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Legend strip -->
  <g font-size="10" fill="#5b606e">
    <rect x="360" y="528" width="560" height="1" fill="rgba(0,0,0,0.08)"/>
    <rect x="376" y="538" width="14" height="10" rx="2" fill="rgba(70,140,220,0.14)" stroke="rgba(70,140,220,0.45)"/>
    <text x="396" y="547">halo (valid drop cells)</text>
    <rect x="516" y="538" width="14" height="10" rx="2" fill="rgba(70,140,220,0.08)" stroke="rgba(70,140,220,0.85)" stroke-width="1.5"/>
    <text x="536" y="547">ghost rect (snap target)</text>
    <rect x="680" y="538" width="14" height="10" rx="2" fill="url(#monLive)" stroke="rgba(70,110,170,0.55)"/>
    <text x="700" y="547">live client / primary monitor</text>
  </g>
</svg>
